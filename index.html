<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenLayers Map</title>
    <!-- Include OpenLayers CSS from a CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net">
    <style>
        /* The div element for the map must have a defined height and width */
        #map {
            height: 400px;
            width: 100%;
        }
    </style>
</head>
<body>
    <!-- The div where the map will be rendered -->
    <div id="map"></div>

    <!-- Include OpenLayers JavaScript from a CDN -->
    <script src="https://cdn.jsdelivr.net/npm/ol@v10.1.0/dist/ol.js"></script>
    
    <script>
        // JavaScript code to initialize the map
        const nsiLayer = new ol.layer.VectorTile({
            source: new ol.source.VectorTile({
                format: new ol.format.MVT(),
                attributions: "USACE",
                minZoom: 7,
                maxZoom: 15,
                url: 'https://ml-dev.sec.usace.army.mil{z}/{x}/{y}.pbf'
            }),
            style: new ol.style.Style({
                stroke: new ol.style.Stroke({ color: 'blue', width: 1 }),
                fill: new ol.style.Fill({ color: 'rgba(0, 0, 255, 0.1)' })
            })
        });

        const map = new ol.Map({
            target: 'map',
            layers: [
                new ol.layer.Tile({ source: new ol.source.OSM() }),
                nsiLayer
            ],
            view: new ol.View({
                center: ol.proj.fromLonLat([-98, 38]),
                zoom: 4
            })
        });
    </script>
</body>
</html>
