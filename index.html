<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenLayers Map</title>
    <!-- Include OpenLayers CSS from a CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net">
    <style>
        /* The div element for the map must have a defined height and width */
        #map {
            height: 400px;
            width: 100%;
        }
    </style>
</head>
<body>
    <!-- The div where the map will be rendered -->
    <div id="map"></div>

    <!-- Include OpenLayers JavaScript from a CDN -->
    <script src="https://cdn.jsdelivr.net/npm/ol@v10.1.0/dist/ol.js"></script>
    
    <script>
        // JavaScript code to initialize the map
        var map = new ol.Map({
            target: 'map', // The ID of the HTML element to render the map into
            layers: [
                new ol.layer.Tile({
                    source: new ol.source.OSM() // Use OpenStreetMap as the tile source
                })
            ],
            view: new ol.View({
                center: ol.proj.fromLonLat([0, 0]), // Center the map at [0, 0] (lon, lat), projected to the map's coordinate system
                zoom: 2 // Set the initial zoom level
            })
        });
    </script>
</body>
</html>
