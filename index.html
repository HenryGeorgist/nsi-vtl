<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenLayers Map</title>
    
    <!-- OpenLayers CSS from CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net">
    
    <style>
        /* Essential: The map container must have a defined height and width */
        html, body, #map {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <!-- The div where the map will be rendered -->
    <div id="map"></div>

    <!-- OpenLayers JavaScript from CDN -->
    <script src="https://cdn.jsdelivr.net"></script>

    <script>
        // Initialize the map
        const map = new ol.Map({
            target: 'map', // The ID of our div
            layers: [
                new ol.layer.Tile({
                    source: new ol.source.OSM() // Base layer from OpenStreetMap
                })
            ],
            view: new ol.View({
                center: ol.proj.fromLonLat([0, 0]), // Center at 0, 0 (Lon, Lat)
                zoom: 2 // Initial zoom level
            })
        });
    </script>
</body>
</html>
